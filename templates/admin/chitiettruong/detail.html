{% extends 'layout/layout.html' %}
{% load static %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/detail.css' %}">
{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>Chi tiết trường đại học</h2>

    <table class="table table-bordered">
        <tr>
            <th>Mã chi tiết</th>
            <td>{{ chitiet.mactt }}</td>
        </tr>
        <tr>
            <th>Mã trường</th>
            <td>{{ chitiet.matruong.matruong }}</td>
        </tr>
        <tr>
            <th>Mô tả</th>
            <td>{{ chitiet.mota }}</td>
        </tr>
        <tr>
            <th>Ghi chú</th>
            <td>{{ chitiet.ghichu }}</td>
        </tr>
    </table>

    <a href="{% url 'admin_chitiettruong_list' %}" class="btn btn-secondary">Quay lại</a>
    <a href="{% url 'admin_chitiettruong_edit' chitiet.mactt %}" class="btn btn-warning">Sửa</a>
</div>
{% endblock %}
