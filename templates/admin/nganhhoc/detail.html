{% extends 'layout/layout.html' %}
{% load static %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/detail.css' %}">
{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>Chi tiết ngành học</h2>

    <table class="table table-bordered">
        <tr>
            <th>Mã ngành</th>
            <td>{{ nganh.manganh }}</td>
        </tr>
        <tr>
            <th>Tên ngành</th>
            <td>{{ nganh.tennganh }}</td>
        </tr>
        <tr>
            <th>Lĩnh vực</th>
            <td>{{ nganh.linhvuc }}</td>
        </tr>
        <tr>
            <th>Mô tả</th>
            <td>{{ nganh.mota }}</td>
        </tr>
    </table>

    <a href="{% url 'admin_nganh_list' %}" class="btn btn-secondary">Quay lại</a>
    <a href="{% url 'admin_nganh_edit' nganh.manganh %}" class="btn btn-warning">Sửa</a>
</div>
{% endblock %}
