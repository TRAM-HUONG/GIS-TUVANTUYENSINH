{% extends 'layout/layout.html' %}
{% load static %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/delete.css' %}">
{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>Xóa ngành học</h2>
    <p>Bạn có chắc muốn xóa ngành <strong>{{ nganh.tennganh }}</strong> không?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Xóa</button>
        <a href="{% url 'admin_nganh_list' %}" class="btn btn-secondary">Hủy</a>
    </form>
</div>
{% endblock %}
