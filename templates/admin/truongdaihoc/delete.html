{% extends 'layout/layout.html' %}
{% block content %}
<div class="container mt-4">
    <h2>Xóa trường đại học</h2>
    <p>Bạn có chắc muốn xóa trường <strong>{{ truong.tentruong }}</strong> không?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Xóa</button>
        <a href="{% url 'admin_truong_list' %}" class="btn btn-secondary">Hủy</a>
    </form>
</div>
{% endblock %}
